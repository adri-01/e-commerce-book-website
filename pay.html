<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Basket - Adrian's Bookshop</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>

     <!-- Header -->
    <nav>
        <!-- left side -->
        <div id="left-navbar">
            <img class="icons" src="images/icons/book.png" alt="logo">
            <h3>Adrian's Bookshop</h3>
        </div>
        <!-- right side -->
        <div id="right-navbar">
                <!-- Mobile -->
            <div class="hamburger">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <!-- Desktop -->
            <ul class="nav-buttons">
                <li><a href="index.html">HOME</a></li>
                <li><a href="#About Us">ABOUT US</a></li>
                <li><a href="#Contact Us">CONTACT US</a></li>
                <li><a href="basket.html">
                    <img class="icons" src="images/icons/trolley.png" alt="basket">
                    <h6>Basket</h6>
                </a></li>
                <li><a href="#SignIn">
                    <img class="icons" src="images/icons/login.png" alt="Sign In">
                    <h6>LOGIN</h6>
                </a></li>
            </ul>
        </div>
        </nav>

    <main class="payment-container">
        <h1>Payment</h1>

        <form class="credit-card">
            <div class="form-header">
                <h4 class="title">Credit card detail</h4>
            </div>
            
            <div class="form-body">
                <!-- Card Number -->
                <input type="text" class="card-number" placeholder="Card Number">
            
                <!-- Date Field -->
                <div class="date-field">
                <div class="month">
                    <select name="Month">
                    <option value=01>January</option>
                    <option value=02>February</option>
                    <option value=03>March</option>
                    <option value=04>April</option>
                    <option value=05>May</option>
                    <option value=06>June</option>
                    <option value=07>July</option>
                    <option value=08>August</option>
                    <option value=09>September</option>
                    <option value=10>October</option>
                    <option value=11>November</option>
                    <option value=12">December</option>
                    </select>
                </div>
                <div class="year">
                    <select name="Year">
                    <option value=2026>2026</option>
                    <option value=2027>2027</option>
                    <option value=2028>2028</option>
                    <option value=2029>2029</option>
                    <option value=2030>2030</option>
                    <option value=2031>2031</option>
                    <option value=2032>2032</option>
                    <option value=2033>2033</option>
                    <option value=2034>2034</option>
                    </select>
                </div>
                </div>
            
                <!-- Card Verification Field -->
                <div class="card-verification">
                <div class="cvv-input">
                    <input type="text" placeholder="CVV">
                </div>
                <div class="cvv-details">
                    <p>3 or 4 digits usually found on the signature strip</p>
                </div>
                </div>
            </div>
            </form>

        <div class="pay-summary">
            <h3>Total: $<span id="total-price">0.00</span></h3>
            <button class="payment-btn">Continue</button>
        </div>
        <a href="basket.html">Back to Basket</a>
    </main>
</body>
</html>
